version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cep-smartwallet-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: CEP.SmartWallet.Api/Dockerfile
    container_name: cep-smartwallet-api
    depends_on:
      - sqlserver
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=SmartWalletDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;

  ui:
    build:
      context: ./CEP.SmartWallet.Ui
      dockerfile: Dockerfile
    container_name: cep-smartwallet-ui
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sql_data: